<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommitStream | Kanban, Tasks & Merge Conflict Predictor</title>
    <meta name="description" content="Manage tasks with an agile Kanban board, predict and resolve git merge conflicts instantly, and enhance team collaboration with CommitStream." />
    <meta name="keywords" content="merge conflict, kanban, task management, project management, team collaboration, github, agile board, merge collision, commitstream, git workflow" />
    <meta name="theme-color" content="#0f172a" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CommitStream | Streamline Dev Team Workflow" />
    <meta property="og:description" content="Manage your dev team's tasks with a real-time Kanban board and instantly predict GitHub merge conflicts before they happen." />

    <meta name="google-site-verification" content="KM30AVsNkbaxuR5JG3aLjNf29bwJZrkVb-d1JCjd1hQ" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect width='18' height='18' x='3' y='3' rx='2'/><path d='m7 11 2-2-2-2'/><path d='M11 13h4'/></svg>" />
    <style>
      .app-loader-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      @media (prefers-color-scheme: dark) {
        .app-loader-container {
          background-color: #0d1117;
        }
      }
      .tech-loader {
        width: 340px;
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      }
      @media (prefers-color-scheme: light) {
        .tech-loader {
          background-color: #ffffff;
          border: 1px solid #e2e8f0;
          box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
      }
      .terminal-header {
        background-color: #21262d;
        padding: 10px 14px;
        display: flex;
        gap: 6px;
        border-bottom: 1px solid #30363d;
      }
      @media (prefers-color-scheme: light) {
        .terminal-header {
          background-color: #f1f5f9;
          border-bottom: 1px solid #e2e8f0;
        }
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .dot.red { background-color: #ff5f56; }
      .dot.yellow { background-color: #ffbd2e; }
      .dot.green { background-color: #27c93f; }
      
      .terminal-body {
        padding: 24px;
        color: #c9d1d9;
        font-size: 14px;
        display: flex;
        align-items: center;
        height: 80px;
      }
      @media (prefers-color-scheme: light) {
        .terminal-body {
          color: #334155;
        }
      }
      .prompt {
        color: #3fb950;
        margin-right: 10px;
        font-weight: bold;
      }
      .typewriter {
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid transparent;
        animation: typing 2s steps(24, end) infinite, blink-caret 0.75s step-end infinite;
        display: inline-block;
        vertical-align: bottom;
      }
      
      .loading-bar-container {
        height: 3px;
        background-color: #30363d;
        width: 100%;
      }
      @media (prefers-color-scheme: light) {
        .loading-bar-container {
          background-color: #e2e8f0;
        }
      }
      .loading-bar {
        height: 100%;
        background-color: #2f81f7;
        width: 0%;
        animation: progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      
      @keyframes typing {
        0%, 15% { width: 0; }
        85%, 100% { width: 195px; } /* Adjust width based on text length */
      }
      @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: #c9d1d9; }
      }
      @media (prefers-color-scheme: light) {
        @keyframes blink-caret {
          from, to { border-color: transparent }
          50% { border-color: #334155; }
        }
      }
      @keyframes progress {
        0% { width: 0%; }
        50% { width: 60%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loader-container">
        <div class="tech-loader">
          <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="terminal-body">
            <span class="prompt">~/app$</span>
            <span class="typewriter">init CommitStream...</span>
          </div>
          <div class="loading-bar-container">
            <div class="loading-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
